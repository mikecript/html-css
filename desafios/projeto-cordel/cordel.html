<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Cordel</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        header{
            background-color: black;
            height: 200px;
        }

        header h1{
            font-size: 4em;
            color: white;
            text-align: center;
            position: inherit;
        }

        header p{
            color: white;
            text-align: center;
            font-size: 1.4em;

        }

        header span{
            font-weight: bold;
        }

        main section{
            background-color: white;
        }

        main h1{
            font-size: 3em;
            width: 700px;
            line-height: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cordel Moderno</h1>
        <p>Por <span>Mike Santos</span></p>
    </header>
    <main>
        <section>
            <h1>Estou ficando cansado
                Da tal tecnologia
                Só se fala por e-mail
                Mensagem curta e fria
                Twitter e Facebook
                Antes que eu caduque
                Vou dizer tudo em poesia.</h1>
        </section>
    </main>
</body>
</html>
